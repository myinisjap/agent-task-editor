services:
  backend:
    ports: !reset []

  frontend:
    ports: !reset []
    labels:
      - traefik.enable=true
      - traefik.http.routers.agent-task-editor.rule=Host(`${TRAEFIK_HOST}`) && PathPrefix(`/tasks`)
      - traefik.http.routers.agent-task-editor.entrypoints=websecure
      - traefik.http.routers.agent-task-editor.tls.certresolver=le
      - traefik.http.routers.agent-task-editor.middlewares=forward-auth
      - traefik.http.services.agent-task-editor.loadbalancer.server.port=80

networks:
  default:
    name: proxy_net
    external: true
