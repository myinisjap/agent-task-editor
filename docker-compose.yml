services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        # Set INSECURE_SKIP_SSL_VERIFY=true in your environment or .env file to
        # disable SSL certificate verification — required behind corporate
        # TLS-inspecting proxies (affects npm install of claude-code at build time
        # and git clone / npm / claude CLI at runtime).
        INSECURE_SKIP_SSL_VERIFY: ${INSECURE_SKIP_SSL_VERIFY:-false}
    ports:
      - "8080:8080"
    # Lets the container reach services published on the host (e.g. a separate
    # local-model container). Use host.docker.internal as the hostname.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8080
      - DB_PATH=/data/agent-task-editor.db
      - CORS_ORIGINS=http://localhost:5173
      # Path to the MCP sidecar binary built into the image
      - MCP_SERVER_PATH=/app/mcp-server
      # Optional: set API_TOKEN to require a Bearer token on all API requests
      # - API_TOKEN=change-me
      # Optional: use provider=anthropic in agent configs to call the API directly
      # instead of the CLI (different billing — pay-per-token vs Claude Max)
      # - LLM_API_KEY=sk-ant-...
      # Local model via a separate container (OpenAI-compatible API, e.g. llama.cpp
      # server). host.docker.internal reaches ports the model publishes on the host.
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:8081/v1}
      # Optional: GitHub token as a fallback if ~/.config/gh isn't mounted.
      # gh CLI picks this up automatically; set it here to enable PR state sync
      # without mounting the gh config directory.
      - GITHUB_TOKEN=${GH_TOKEN:-}
      # SSL bypass — active when INSECURE_SKIP_SSL_VERIFY=true (see build args above).
      # These vars are pre-computed by dev.sh so that setting INSECURE_SKIP_SSL_VERIFY=false
      # never accidentally disables SSL (compose's :+ expansion fires on any non-empty value).
      - GIT_SSL_NO_VERIFY=${GIT_SSL_NO_VERIFY:-}
      - NPM_CONFIG_STRICT_SSL=${NPM_CONFIG_STRICT_SSL:-}
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-}
      # Set to the host directory containing your repos. The backend rewrites
      # paths under this directory to /repos inside the container automatically.
      - REPO_BASE_DIR=${REPO_BASE_DIR:-/tmp/repos}
    volumes:
      - db_data:/data
      # Claude Max auth — run 'claude login' on your host machine first,
      # then this mount shares that session with the container.
      - ${HOME}/.claude:/home/node/.claude
      - ${HOME}/.claude.json:/home/node/.claude.json
      # GitHub CLI auth — run 'gh auth login' on your host machine first,
      # then this mount shares that credential with the container.
      # The :ro flag makes it read-only (the container never writes new auth).
      - ${HOME}/.config/gh:/home/node/.config/gh:ro
      # Repos directory — mounted at the same path so host paths work as-is.
      - ${REPO_BASE_DIR:-/tmp/repos}:${REPO_BASE_DIR:-/tmp/repos}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INSECURE_SKIP_SSL_VERIFY: ${INSECURE_SKIP_SSL_VERIFY:-false}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: on-failure

volumes:
  db_data:
