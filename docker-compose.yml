services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # Set INSECURE_SKIP_SSL_VERIFY=true in your environment or .env file to
        # disable SSL certificate verification — required behind corporate
        # TLS-inspecting proxies (affects npm install of claude-code at build time
        # and git clone / npm / claude CLI at runtime).
        INSECURE_SKIP_SSL_VERIFY: ${INSECURE_SKIP_SSL_VERIFY:-false}
        # Set to true (or pass --all-cli to dev.sh) to also install the
        # Gemini, Codex, and Qwen CLIs in the locally-built backend image —
        # off by default so a plain `docker compose up --build` stays small
        # and only ships the Claude CLI.
        INSTALL_GEMINI_CLI: ${INSTALL_GEMINI_CLI:-false}
        INSTALL_CODEX_CLI: ${INSTALL_CODEX_CLI:-false}
        INSTALL_QWEN_CLI: ${INSTALL_QWEN_CLI:-false}
    ports:
      - "8080:8080"
    # Lets the container reach services published on the host (e.g. a separate
    # local-model container). Use host.docker.internal as the hostname.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - PORT=8080
      - DB_PATH=/data/agent-task-editor.db
      - CORS_ORIGINS=http://localhost:5173
      # Run agents as your host user so files they write to bind-mounted repos
      # are owned by you, not root. dev.sh sets these from `id -u`/`id -g`.
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      # Path to the MCP sidecar binary built into the image
      - MCP_SERVER_PATH=/app/mcp-server
      # Optional: set API_TOKEN to require a Bearer token on all API requests
      # - API_TOKEN=change-me
      # Optional: use provider=anthropic in agent configs to call the API directly
      # instead of the CLI (different billing — pay-per-token vs Claude Max)
      # - LLM_API_KEY=sk-ant-...
      # Local model via a separate container (OpenAI-compatible API, e.g. llama.cpp
      # server). host.docker.internal reaches ports the model publishes on the host.
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:8081/v1}
      # qwen_code provider config. Not the shared host ~/.qwen (whose baseUrl is
      # localhost:8081 — the backend itself, from in here). QWEN_HOME points qwen
      # at the mounted /etc/qwen/settings.json instead; QWEN_RUNTIME_DIR sends
      # qwen's ephemeral writes to a writable path so /etc/qwen can stay read-only.
      - QWEN_HOME=/home/node/qwen-home
      - QWEN_RUNTIME_DIR=/tmp/qwen
      # Optional: GitHub token as a fallback if ~/.config/gh isn't mounted.
      # gh CLI picks this up automatically; set it here to enable PR state sync
      # without mounting the gh config directory.
      - GITHUB_TOKEN=${GH_TOKEN:-}
      # SSL bypass — active when INSECURE_SKIP_SSL_VERIFY=true (see build args above).
      # These vars are pre-computed by dev.sh so that setting INSECURE_SKIP_SSL_VERIFY=false
      # never accidentally disables SSL (compose's :+ expansion fires on any non-empty value).
      - GIT_SSL_NO_VERIFY=${GIT_SSL_NO_VERIFY:-}
      - NPM_CONFIG_STRICT_SSL=${NPM_CONFIG_STRICT_SSL:-}
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-}
      # Set to the host directory containing your repos. The backend rewrites
      # paths under this directory to /repos inside the container automatically.
      - REPO_BASE_DIR=${REPO_BASE_DIR:-/tmp/repos}
      # Dev-only raw agent-log capture. dev.sh --raw-log-dir sets AGENT_RAW_LOG_DIR
      # on the host; here we redirect to /data/raw-logs (on the db_data volume, so
      # no new mount) only when the flag is present. See docs/getting-started.md.
      - AGENT_RAW_LOG_DIR=${AGENT_RAW_LOG_DIR:+/data/raw-logs}
      # Optional: write rotated local snapshots to /data/backups every BACKUP_INTERVAL,
      # keeping the newest BACKUP_KEEP. /data is the db_data volume, so this persists
      # with no new volume needed. See docs/backup.md.
      - BACKUP_DIR=${BACKUP_DIR:+/data/backups}
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-24h}
      - BACKUP_KEEP=${BACKUP_KEEP:-7}
    volumes:
      - db_data:/data
      # Claude Max auth — run 'claude login' on your host machine first,
      # then this mount shares that session with the container.
      - ${HOME}/.claude:/home/node/.claude
      - ${HOME}/.claude.json:/home/node/.claude.json
      # GitHub CLI auth — run 'gh auth login' on your host machine first,
      # then this mount shares that credential with the container.
      # The :ro flag makes it read-only (the container never writes new auth).
      - ${HOME}/.config/gh:/home/node/.config/gh:ro
      # qwen container config (see QWEN_HOME above). Only settings.json is shared
      # from the host (editable at backend/qwen-config/settings.json); the rest of
      # /etc/qwen is the container's writable layer, so qwen's own startup writes
      # (output-language.md, logs) go there instead of into the repo.
      - ${QWEN_CONFIG_FILE:-./backend/qwen-config/settings.json}:/home/node/qwen-home/settings.json
      # Repos directory — mounted at the same path so host paths work as-is.
      - ${REPO_BASE_DIR:-/tmp/repos}:${REPO_BASE_DIR:-/tmp/repos}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INSECURE_SKIP_SSL_VERIFY: ${INSECURE_SKIP_SSL_VERIFY:-false}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: on-failure

volumes:
  db_data:
