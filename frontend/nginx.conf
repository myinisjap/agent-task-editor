server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; manifest-src 'self';" always;

    # nginx:alpine's bundled mime.types doesn't map .webmanifest by default;
    # set it explicitly (scoped to this file only) so browsers accept it as
    # a valid web app manifest for installability.
    location = /tasks/manifest.webmanifest {
        alias /usr/share/nginx/html/manifest.webmanifest;
        default_type application/manifest+json;
    }

    # The chat terminal is a WebSocket living under /api/ (unlike /ws), so it
    # needs the upgrade headers the generic /tasks/api/ block below omits. Regex
    # location wins over the prefix match. Strips the /tasks prefix like the API.
    location ~ ^/tasks/(api/v1/chat/sessions/[^/]+/terminal)$ {
        proxy_pass http://backend:8080/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
    }

    location /tasks/api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
    }

    location /tasks/ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
    }

    location = /tasks {
        return 301 /tasks/;
    }

    location /tasks/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }
}
