name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend
      - run: go build ./...

      # Fails if internal/storage/gen/ (sqlc-generated code) doesn't match
      # internal/storage/queries/*.sql + migrations/*.up.sql. Pinned to the
      # exact sqlc version that produced the currently-committed gen/ output,
      # so this only trips on real drift, not tool-version noise.
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
      - name: Check sqlc codegen drift
        run: |
          sqlc generate
          git diff --exit-code -- internal/storage/gen

      - name: go test (with coverage)
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage summary
        if: always()
        run: go tool cover -func=coverage.out | tail -1 >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

      # The stdlib CVEs (crypto/tls, crypto/x509, net/http, os, ...) that
      # previously kept this step non-blocking were fixed in Go 1.25.8+. The
      # toolchain that runs here — the setup-go step above and the Dockerfile
      # builder — is now Go 1.26, so govulncheck analyzes against a patched
      # stdlib and this step is blocking again. (The go.mod `go 1.24`
      # directive stays as the language floor; it does not affect the stdlib
      # version govulncheck sees, which comes from the running toolchain.)
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc -b
      - run: npm run build
      - run: npm run lint

      # Fails if src/api/types.ts (generated by openapi-typescript from the
      # root openapi.yaml) doesn't match the committed spec, so the API spec
      # and the generated client types can't silently diverge.
      - name: Check generated API types are up to date
        run: |
          npm run gen:api
          git diff --exit-code -- src/api/types.ts

      - name: Test with coverage
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Verifies both Dockerfiles still build. The backend image's final
      # stage doubles as the agents' execution toolchain, not just a
      # deployment artifact, so a broken build here is a functional
      # regression, not just a packaging one. Build-only (no `up`) so no
      # .env file is needed — every env var in docker-compose.yml has a
      # ${VAR:-default} fallback.
      - name: docker compose build
        run: docker compose build
