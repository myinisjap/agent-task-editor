name: Release

# Build and publish multi-arch (amd64 + arm64) images to GHCR on every semver
# tag push, then cut a GitHub Release. arm64 is built explicitly because the
# backend links cgo/sqlite (mattn/go-sqlite3) and is worth verifying natively.
#
# Two ways to cut a release:
#
#   1. Run the "Prepare Release" workflow manually (Actions tab -> Prepare
#      Release -> Run workflow) and pick a version bump (patch/minor/major).
#      It moves CHANGELOG.md's `[Unreleased]` section under a new version
#      heading, pushes that to main, then creates and pushes the matching
#      tag — which is what triggers this workflow below.
#
#   2. Push a tag directly:
#        git tag v1.2.3 && git push origin v1.2.3
#      Useful for hotfixes where you want to hand-edit CHANGELOG.md
#      yourself before tagging. Triggers this workflow the same way.
#
# Publishes:
#   ghcr.io/myinisjap/agent-task-editor-backend:{1.2.3,1.2,1,latest}
#   ghcr.io/myinisjap/agent-task-editor-frontend:{1.2.3,1.2,1,latest}
#
# Also publishes an "-all-cli" variant of the backend image with the Gemini,
# Codex, and Qwen CLIs baked in (normally gated behind opt-in build args —
# see backend/Dockerfile), for users who want every provider available
# without building locally:
#   ghcr.io/myinisjap/agent-task-editor-backend:{1.2.3,1.2,1,latest}-all-cli

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

jobs:
  images:
    name: Build & push ${{ matrix.component }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./backend
          - component: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          # Stamps cmd/server's `main.Version` (see backend/Dockerfile) so
          # GET /healthz and the Health page report this release tag instead
          # of "dev". Harmless no-op for the frontend image, which has no
          # matching ARG VERSION in its Dockerfile.
          build-args: |
            VERSION=${{ github.ref_name }}

  backend-all-cli:
    name: Build & push backend all-cli image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-backend
          flavor: |
            suffix=-all-cli,onlatest=true
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-all-cli
          cache-to: type=gha,mode=max,scope=backend-all-cli
          build-args: |
            VERSION=${{ github.ref_name }}
            INSTALL_GEMINI_CLI=true
            INSTALL_CODEX_CLI=true
            INSTALL_QWEN_CLI=true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [images, backend-all-cli]
    steps:
      - uses: actions/checkout@v7

      - name: Extract changelog section
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="$(mktemp)"
          # Pull the body of the matching CHANGELOG section (## [x.y.z] ... up to
          # the next ## heading). Falls back to auto-generated notes if absent.
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > "$notes_file" || true
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
          if [ -s "$notes_file" ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.has_notes == 'true' && steps.changelog.outputs.notes_file || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.has_notes != 'true' }}
          fail_on_unmatched_files: false
