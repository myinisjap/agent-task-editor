openapi: "3.1.0"
info:
  title: Agent Task Editor API
  version: "1.0.0"

servers:
  - url: http://localhost:8080/api/v1

components:
  schemas:
    Task:
      type: object
      properties:
        id:          { type: string }
        title:       { type: string }
        description: { type: string }
        type:        { type: string, enum: [feature, bug, chore, spike] }
        label:       { type: string }
        repo_id:     { type: string }
        workflow_id: { type: string }
        current_agent_run_id: { type: string, nullable: true }
        active_agent_run_id:  { type: string, nullable: true }
        agent_notes: { type: string }
        branch:        { type: string, description: "Per-task git branch (empty until first dispatch)" }
        worktree_path: { type: string, description: "Path to the task's git worktree" }
        base_ref:      { type: string, description: "Ref the branch forked from" }
        paused:        { type: boolean, description: "If true, the task is never auto-picked-up by the dispatcher" }
        archived:
          type: boolean
          description: >
            If true, the task is hidden from the default board view (GET /tasks
            excludes it unless archived=all|only), skipped by the GitHub PR
            status sweep, and never picked up by the dispatcher. Independent of
            the task's label.
        git_state:     { type: string, enum: ["", pushed, pr_open, pr_merged, pr_closed] }
        pr_url:
          type: string
          description: >
            URL of the GitHub pull request opened for this task's branch (via
            POST /tasks/{id}/pr, or discovered by the GitHub PR status sweep).
            Empty until a PR exists.
        transient_retry_count:
          type: integer
          description: >
            Number of consecutive automatic retries this task has had for
            transient provider errors (rate limits, network blips, upstream
            5xx). Reset to 0 on a genuine failure or a successful run.
        next_retry_at:
          type: string
          format: date-time
          nullable: true
          description: >
            If set, the task is in a backed-off auto-retry state and will not
            be picked up by the dispatcher again until this time.
        source:
          type: string
          description: >
            Where the task was imported from ("github" for the GitHub Issues
            importer). Empty for manually created tasks.
        source_ref:
          type: string
          description: >
            External item the task was imported from, unique within source
            (e.g. "owner/repo#123"). Empty for manually created tasks.
        blocked_by_count:
          type: integer
          description: >
            Derived (read-time) count of this task's dependency blockers whose
            edges are still unsatisfied. A task with any unsatisfied blocker is
            never picked up by the dispatcher. A blocker is satisfied once it
            reaches a terminal label or is archived. Zero when the task has no
            unsatisfied blockers.
        blocking_count:
          type: integer
          description: >
            Derived (read-time) count of tasks that depend on this task (i.e.
            this task is a blocker for that many other tasks).
        parent_task_id:
          type: string
          nullable: true
          description: >
            Parent task id when this task is a subtask (Mechanism 2), else null.
            A subtask branches off its parent's branch and merges back on
            terminal; the parent isn't dispatched until every child finishes.
        created_by_run_id:
          type: string
          nullable: true
          description: The agent run that created this subtask (provenance).
        merge_status:
          type: string
          enum: ["", pending, merged, merge_conflict]
          description: >
            A subtask's branch merge-back state into its parent's branch. Empty
            for non-subtasks and until the child reaches a terminal label.
        subtask_total:
          type: integer
          description: "Derived: number of this task's direct children (0 if not a parent)."
        subtask_done:
          type: integer
          description: "Derived: children currently on a terminal label."
        subtask_conflicts:
          type: integer
          description: "Derived: children whose merge-back is in conflict."
        max_cost_usd:
          type: number
          format: double
          description: >
            Advisory per-task cost budget cap in USD, checked by the
            dispatcher before each sweep-dispatch against the task's
            cumulative recorded run cost (across every run, any status).
            0 disables the cap (unlimited). If the matched agent config also
            has a nonzero max_cost_usd, the effective budget is the lower of
            the two. Not a mid-run kill switch — see AgentConfig.max_cost_usd
            and docs/agents.md#cost-budgets.
        priority:
          type: integer
          enum: [-1, 0, 1, 2]
          description: >
            Dispatch priority: -1=low, 0=normal (default), 1=high, 2=urgent.
            ListAgentPickupTasks orders eligible tasks by priority DESC, then
            created_at ASC, so higher-priority tasks are dispatched first when
            there are more eligible tasks than free workers (MAX_WORKERS).
        queue_position:
          type: integer
          nullable: true
          description: >
            Derived, read-time 0-based position in the current agent-pickup
            queue (priority DESC, created_at ASC) among tasks eligible for
            dispatch, computed only when the worker pool has no free slot
            (all MAX_WORKERS busy). Null/absent when the task is not
            currently pickup-eligible (e.g. blocked, paused, archived, or not
            on an agent-triggerable label) or when the pool has idle
            capacity and the task would be dispatched immediately.
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    DependencyEdge:
      type: object
      description: One end of a task dependency edge (a blocker or a dependent).
      properties:
        task_id:   { type: string, description: "The other task in the edge" }
        title:     { type: string }
        label:     { type: string }
        archived:  { type: boolean }
        satisfied:
          type: boolean
          description: >
            For a blocker: whether the edge is satisfied (the blocker is terminal
            or archived). Not meaningful for dependents (always false there).

    TaskDependencies:
      type: object
      description: Both directions of a task's dependency edges.
      properties:
        blocked_by:
          type: array
          items: { $ref: '#/components/schemas/DependencyEdge' }
          description: Tasks this task depends on (its blockers), newest first.
        blocking:
          type: array
          items: { $ref: '#/components/schemas/DependencyEdge' }
          description: Tasks that depend on this task, newest first.
        blocked_by_count: { type: integer, description: "Count of unsatisfied blockers" }
        blocking_count:   { type: integer, description: "Count of dependents" }

    TaskTemplate:
      type: object
      description: >
        Reusable pre-filled title/description/type for recurring shapes of
        work (e.g. "upgrade dependency X", "fix flaky test"). Applied in the
        new-task form; creating a task from a template just pre-fills fields.
      properties:
        id:          { type: string }
        name:        { type: string, description: "Unique display name" }
        title:       { type: string }
        description: { type: string }
        type:        { type: string, enum: [feature, bug, chore, spike] }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    WorkflowLabel:
      type: object
      properties:
        id:           { type: string }
        workflow_id:  { type: string }
        name:         { type: string }
        color:        { type: string }
        sort_order:   { type: integer }
        agent_ignore: { type: integer }
        is_terminal:  { type: integer }

    WorkflowTransition:
      type: object
      properties:
        id:               { type: string }
        workflow_id:      { type: string }
        from_label:       { type: string }
        to_label:         { type: string }
        trigger_type:     { type: string, enum: [agent, human, both] }
        agent_config_id:  { type: string, nullable: true }

    Workflow:
      type: object
      properties:
        id:          { type: string }
        name:        { type: string }
        description: { type: string }
        labels:      { type: array, items: { $ref: "#/components/schemas/WorkflowLabel" } }
        transitions: { type: array, items: { $ref: "#/components/schemas/WorkflowTransition" } }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    AgentConfig:
      type: object
      properties:
        id:            { type: string }
        name:          { type: string }
        provider:      { type: string, enum: [claude_code, openai, anthropic, custom, opencode] }
        model:         { type: string }
        system_prompt: { type: string }
        labels:        { type: string, description: "JSON array of label names" }
        env:           { type: string, description: "JSON object of env vars" }
        max_tokens:    { type: integer }
        timeout_secs:  { type: integer }
        max_turns:     { type: integer }
        max_retries:
          type: integer
          description: >
            Number of automatic consecutive retries allowed for a task after a
            transient provider error (rate limit, network blip, upstream 5xx)
            before it is left failed / escalated to waiting_human for a human
            to intervene. 0 disables auto-retry. Default 3.
        retry_backoff_secs:
          type: integer
          description: >
            Base backoff, in seconds, before a transient-error retry becomes
            eligible for re-dispatch. Exponential backoff (base * 2^attempt,
            capped at 10 minutes) is applied on top of this base. Default 30.
        resume_sessions:
          type: boolean
          description: >
            Whether new runs for a task resume the previous run's provider
            session (claude provider only; other providers ignore it). On by
            default. Off means every run starts cold — useful for stages that
            should look at the work with fresh eyes (e.g. agent review).
        subtasks_enabled:
          type: boolean
          description: >
            Whether this config's runs may decompose their task into subtasks via
            the create_subtask MCP tool (claude/qwen_code only). Off by default —
            a deliberate capability granted to a specific agent (the planner).
        max_subtasks:
          type: integer
          description: "Per-parent cap on children this config may create. Default 10."
        enabled_plugins:
          type: string
          description: >
            JSON array of Claude plugin IDs ("<name>@<marketplace>") enabled for this
            agent config. Claude-provider only; defaults to "[]" (all plugins off).
        enabled_mcp_servers:
          type: string
          description: >
            JSON array of Claude user-level MCP server names (from ~/.claude.json's
            global mcpServers) enabled for this agent config. Claude-provider only;
            defaults to "[]" (all MCP servers off).
        command_allowlist:
          type: string
          description: >
            JSON array of shell-command glob patterns ("*" wildcard). If non-empty, only
            commands matching at least one pattern may run via run_bash/Bash. Fully
            enforced for anthropic, llm, and qwen_code. NOT an effective restriction for
            claude (the CLI only auto-approves matches; non-matching commands still run
            — see docs/providers/claude.md). Not enforced for opencode. Defaults to "[]"
            (no restriction).
        command_denylist:
          type: string
          description: >
            JSON array of shell-command glob patterns ("*" wildcard). Commands matching
            any pattern here are always denied, regardless of command_allowlist. Checked
            first. Fully enforced for anthropic, llm, and claude. NOT enforced for
            qwen_code (no confirmed CLI denylist flag) or opencode. Defaults to "[]"
            (no restriction).
        max_cost_usd:
          type: number
          format: double
          description: >
            Advisory per-task cost budget cap in USD, checked by the dispatcher
            before each sweep-dispatch against the task's cumulative recorded
            run cost so far (across every run for the task, any status). 0
            disables the cap (unlimited). Default 0. If the task itself also
            has a nonzero max_cost_usd, the effective budget is the lower of
            the two. NOT a mid-run kill switch — no provider supports killing
            an in-flight run at a cost threshold; the guard only blocks the
            *next* dispatch once the budget is already exhausted. See
            docs/agents.md#cost-budgets.
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    ModelList:
      type: object
      properties:
        provider:      { type: string }
        default_model: { type: string }
        models:        { type: array, items: { type: string } }

    ClaudeOptions:
      type: object
      description: >
        Claude plugins and user-level MCP servers discovered on the server's
        Claude home directory (~/.claude/plugins/installed_plugins.json and the
        global mcpServers key in ~/.claude.json), for per-agent-config selection.
      properties:
        plugins:
          type: array
          items:
            type: object
            properties:
              id:          { type: string, description: "\"<name>@<marketplace>\"" }
              name:        { type: string }
              marketplace: { type: string }
        mcp_servers:
          type: array
          items: { type: string }

    Repo:
      type: object
      properties:
        id:          { type: string }
        name:        { type: string }
        path:        { type: string }
        remote_url:  { type: string, nullable: true }
        workflow_id: { type: string, nullable: true }
        issue_sync_enabled:
          type: integer
          description: >
            1 = open GitHub issues matching issue_sync_label are periodically
            imported as tasks (requires remote_url and workflow_id). 0 = off.
        issue_sync_label:
          type: string
          description: >
            Only import issues carrying this label (empty = all open issues).
        issue_writeback_enabled:
          type: integer
          description: >
            1 = status write-back to the source GitHub issue is enabled for
            this repo's imported tasks (requires remote_url; independent of
            issue_sync_enabled): comments on the issue when a task's PR
            opens, applies the "agent-in-progress" label when a task first
            leaves not_ready, and closes the issue with a comment when the
            PR merges. 0 = off. See docs/task-sources.md.
        clone_status:
          type: string
          enum: [ready, cloning, error]
          description: >
            State of the repo's initial auto-clone. 'ready' for local repos and
            finished clones; 'cloning' while an async git clone is in progress
            (POST /repos returns immediately with this status); 'error' if the
            clone failed (see clone_error). Watch the repo.clone_done /
            repo.clone_failed WebSocket events for transitions out of 'cloning'.
        clone_error:
          type: string
          description: Human-readable failure detail when clone_status is 'error'.
        created_at:  { type: string, format: date-time }

    ReviewComment:
      type: object
      description: >-
        A persistent, file/line-anchored inline review comment on a task's
        diff. Open comments are injected into every agent run's prompt until
        resolved (by an agent via the MCP resolve_comment tool, or by a human).
      properties:
        id:                 { type: string }
        task_id:            { type: string }
        file_path:          { type: string }
        side:               { type: string, enum: [old, new] }
        start_line:         { type: integer }
        end_line:           { type: integer }
        quoted_text:        { type: string }
        body:               { type: string }
        status:             { type: string, enum: [open, resolved] }
        resolution_note:    { type: string, nullable: true }
        resolved_by_run_id: { type: string, nullable: true, description: "Run that resolved it; null when human-resolved" }
        created_at:         { type: string, format: date-time }
        updated_at:         { type: string, format: date-time }

    AgentRun:
      type: object
      properties:
        id:               { type: string }
        task_id:          { type: string }
        agent_config_id:  { type: string }
        status:           { type: string, enum: [pending, running, completed, failed, waiting_human, cancelled] }
        feedback:         { type: string, nullable: true }
        started_at:       { type: string, format: date-time, nullable: true }
        completed_at:     { type: string, format: date-time, nullable: true }
        created_at:       { type: string, format: date-time }
        input_tokens:
          type: integer
          description: >-
            Total input/prompt tokens consumed across the run (summed across
            all turns of a multi-turn agentic loop). 0 if the provider does
            not report usage (e.g. opencode currently).
        output_tokens:
          type: integer
          description: Total output/completion tokens consumed across the run.
        cost_usd:
          type: number
          format: double
          description: >-
            Estimated USD cost of the run. For the `claude` CLI provider this
            is the CLI's own authoritative total_cost_usd figure (which may
            legitimately be 0 under a Claude Max subscription); for
            anthropic/llm providers it is computed from input/output tokens
            via an internal, approximate pricing table. 0 if unknown/unreported.
        session_id:
          type: string
          description: >-
            Provider-side conversation session recorded for this run (the
            claude/qwen CLI stream-json session_id). A later run on the same
            task under the same agent config resumes it (claude provider only,
            unless the config's resume_sessions is off). Empty for
            providers/runs without a session.

    TaskLabelHistory:
      type: object
      description: >-
        One row of a task's label-transition audit trail
        (task_label_history), oldest first.
      properties:
        id:         { type: string }
        task_id:    { type: string }
        from_label: { type: string, nullable: true }
        to_label:   { type: string }
        trigger:    { type: string, enum: [agent, human, subtasks_complete] }
        actor_id:
          type: string
          nullable: true
          description: >-
            For human-triggered transitions, the resolved named-token actor
            (see BearerAuth / API_TOKENS) — null/empty when the legacy
            shared API_TOKEN or no auth was used. For agent-triggered
            transitions, the agent run ID.
        note:       { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    AgentLog:
      type: object
      properties:
        id:           { type: string }
        agent_run_id: { type: string }
        timestamp:    { type: string, format: date-time }
        type:         { type: string, enum: [stdout, stderr, system, tool_call, tool_result] }
        content:      { type: string }

    Dashboard:
      type: object
      properties:
        label_counts:
          type: object
          additionalProperties: { type: integer }
        active_agents:
          type: array
          items:
            type: object
            properties:
              run_id:     { type: string }
              task_id:    { type: string }
              task_title: { type: string }
              agent_name: { type: string }
              started_at: { type: string }
        intervention_queue:
          type: array
          items:
            type: object
            properties:
              run_id:     { type: string }
              task_id:    { type: string }
              task_title: { type: string }
              message:    { type: string, nullable: true }
              created_at: { type: string }
        cost_total:
          type: object
          description: >-
            Aggregate token/cost usage across all runs in a terminal state
            (completed, failed, waiting_human).
          properties:
            input_tokens:  { type: integer }
            output_tokens: { type: integer }
            cost_usd:      { type: number, format: double }
        cost_by_provider:
          type: array
          description: >-
            Per-provider breakdown of token/cost usage, sorted by cost
            descending. Runs whose agent_config was later deleted are
            excluded (agent_config_id is set NULL on delete, so they can no
            longer be attributed to a provider).
          items:
            type: object
            properties:
              provider:      { type: string }
              input_tokens:  { type: integer }
              output_tokens: { type: integer }
              cost_usd:      { type: number, format: double }
              run_count:     { type: integer }
        agent_config_stats:
          type: array
          description: >-
            Per-agent-config run analytics, sorted by run_count descending.
            Only runs in a terminal status (completed/failed/waiting_human)
            with a still-existing agent_config are included, same filtering
            as cost_by_provider. Two caveats: (1) avg_turns_to_done and the
            retry fields are attributed entirely to a task's *last* run's
            agent config, not proportionally split across every config a
            task passed through; (2) avg_transient_retries and
            tasks_with_retries are a live snapshot of
            tasks.transient_retry_count, which resets to 0 on success or
            escalation to a human — not a lifetime/historical retry count.
          items:
            type: object
            properties:
              agent_config_id:        { type: string }
              agent_name:             { type: string }
              provider:               { type: string }
              run_count:              { type: integer }
              completed_count:        { type: integer }
              failed_count:           { type: integer }
              waiting_human_count:    { type: integer }
              success_rate_percent:   { type: number, format: double }
              avg_duration_secs:      { type: number, format: double }
              p90_duration_secs:      { type: number, format: double }
              avg_turns_to_done:      { type: number, format: double }
              avg_transient_retries:  { type: number, format: double }
              tasks_with_retries:     { type: integer }
              input_tokens:           { type: integer }
              output_tokens:          { type: integer }
              cost_usd:               { type: number, format: double }
        cost_by_day:
          type: array
          description: >-
            Daily token/cost/run-count rollup, most recent day first, capped
            at the last 30 days with recorded activity. Same terminal-status
            filtering as cost_total.
          items:
            type: object
            properties:
              day:           { type: string, description: "ISO date (YYYY-MM-DD)" }
              input_tokens:  { type: integer }
              output_tokens: { type: integer }
              cost_usd:      { type: number, format: double }
              run_count:     { type: integer }
        cost_by_task:
          type: array
          description: >-
            Top 20 tasks by cumulative recorded cost. Unlike cost_total /
            cost_by_provider / agent_config_stats, this includes runs in
            EVERY status (not just terminal ones) — a cost rollup should
            reflect every run that ran, including ones still in flight or
            that failed, matching the same filtering the dispatcher's
            cost-budget guard uses (see docs/agents.md#cost-budgets).
          items:
            type: object
            properties:
              task_id:       { type: string }
              task_title:    { type: string }
              input_tokens:  { type: integer }
              output_tokens: { type: integer }
              cost_usd:      { type: number, format: double }
        claude_usage:
          type: object
          description: >-
            Live Claude account rate-limit usage from Anthropic's OAuth usage
            endpoint (5-hour rolling window + weekly window). `available` is
            false when the server has no Claude OAuth credentials or the fetch
            failed; other fields are zero/absent in that case.
          properties:
            available:           { type: boolean }
            five_hour_percent:   { type: number, format: double }
            five_hour_resets_at: { type: string, format: date-time, nullable: true }
            weekly_percent:      { type: number, format: double }
            weekly_resets_at:    { type: string, format: date-time, nullable: true }

    ProviderCheck:
      type: object
      description: A single provider/onboarding readiness row.
      properties:
        id:
          type: string
          description: Stable identifier (e.g. claude_cli, mcp_sidecar, gh_auth).
        name:
          type: string
          description: Human-readable check name.
        status:
          type: string
          enum: [ok, warn, error]
          description: >
            ok = ready (green); warn = optional/degraded or heuristically
            undetected (yellow); error = required item missing, runs will fail (red).
        detail:
          type: string
          description: One-line description of the current state.
        hint:
          type: string
          description: How to fix it; present when status is not ok.
      required: [id, name, status, detail]

    Error:
      type: object
      properties:
        error: { type: string }

paths:
  /tasks:
    get:
      summary: List tasks
      parameters:
        - name: q
          in: query
          description: Case-insensitive substring search over title and description
          schema: { type: string }
        - name: label
          in: query
          schema: { type: string }
        - name: repo_id
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: git_state
          in: query
          schema: { type: string, enum: [pushed, pr_open, pr_merged, pr_closed] }
        - name: parent_id
          in: query
          description: >
            When set, returns the direct children (subtasks) of this parent task
            (one family at a time), bypassing pagination.
          schema: { type: string }
        - name: archived
          in: query
          description: >
            Archived-task visibility. Omitted (default) hides archived tasks;
            "only" returns just archived tasks; "all" returns everything.
          schema: { type: string, enum: [all, only] }
        - name: limit
          in: query
          description: Page size. Defaults to 200; values above 500 are clamped to 500.
          schema: { type: integer, default: 200, maximum: 500 }
        - name: after
          in: query
          description: >
            Cursor for the next page: the id of the last task from the previous
            page (returned in that response's X-Next-Cursor header). Omit for the
            first page.
          schema: { type: string }
      responses:
        "200":
          description: >
            A page of tasks, newest first. When more tasks remain, the id to pass
            as the next `after` cursor is returned in the X-Next-Cursor header
            (absent on the final page).
          headers:
            X-Next-Cursor:
              description: Cursor for the next page; absent when no more tasks remain.
              schema: { type: string }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Task" } }
    post:
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, repo_id, workflow_id]
              properties:
                title:       { type: string }
                description: { type: string }
                type:        { type: string }
                repo_id:     { type: string }
                workflow_id: { type: string }
                priority:    { type: integer, enum: [-1, 0, 1, 2], default: 0 }
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/bulk:
    post:
      summary: Apply one action to many tasks
      description: >
        Applies a single action to every task in ids. Each task is processed
        independently — one failure doesn't abort the rest. Returns 200 if
        every task succeeded, 207 if any failed; the per-task results array
        reports each outcome either way. "move" transitions are validated
        through the workflow engine exactly like PATCH /tasks/{id}/label.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, action]
              properties:
                ids:      { type: array, items: { type: string } }
                action:   { type: string, enum: [move, pause, resume, archive, unarchive] }
                to_label: { type: string, description: "Required when action is move" }
                note:     { type: string, description: "Optional transition note (move only)" }
      responses:
        "200":
          description: All tasks processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:    { type: string }
                        ok:    { type: boolean }
                        error: { type: string }
        "207": { description: Some tasks failed; see per-task results }
        "400": { description: Missing ids, unknown action, or move without to_label }

  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a task
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
    patch:
      summary: Update a task's metadata
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:       { type: string }
                description: { type: string }
                type:        { type: string }
                priority:    { type: integer, enum: [-1, 0, 1, 2] }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
    delete:
      summary: Delete a task
      responses:
        "204": { description: Deleted }

  /tasks/{id}/label:
    patch:
      summary: Move task label (human-initiated)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_label]
              properties:
                to_label: { type: string }
                note:     { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { description: Invalid transition }
        "403": { description: Gate required }

  /tasks/{id}/archive:
    patch:
      summary: Archive or unarchive a task
      description: >
        Archived tasks are hidden from the default board view, excluded from
        the GitHub PR status sweep, and never dispatched to agents. Archiving
        does not change the task's label.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [archived]
              properties:
                archived: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { description: Task not found }

  /tasks/{id}/pause:
    patch:
      summary: Pause or unpause a task
      description: >
        A paused task is never picked up by the dispatcher, regardless of its
        current label. Pausing does not change the task's label and does not
        cancel any in-flight agent run; it only blocks future dispatch.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paused]
              properties:
                paused: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/dependencies:
    get:
      summary: List a task's dependency edges
      description: >
        Returns both directions of the task's dependency edges: the tasks it is
        blocked by (each with derived satisfaction state) and the tasks that
        depend on it. Dependencies are a pure dispatch gate — a task with any
        unsatisfied blocker is never picked up by the dispatcher, though a human
        can still move it anywhere.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskDependencies" }
        "404": { description: Task not found }
    post:
      summary: Add a dependency (this task depends on another)
      description: >
        Creates an edge so this task is not dispatched until the depended-on
        task reaches a terminal label or is archived. Both tasks must be in the
        same workflow, and the blocker's workflow must have a terminal label
        (otherwise the edge could never satisfy). Cycles and self-edges are
        rejected.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [depends_on_task_id]
              properties:
                depends_on_task_id: { type: string }
      responses:
        "204": { description: Dependency created }
        "400": { description: Self-edge, cross-workflow, or blocker workflow has no terminal label }
        "404": { description: Task not found }
        "409": { description: Edge already exists or would create a cycle }

  /tasks/{id}/subtasks:
    post:
      summary: Create a subtask under a parent
      description: >
        Creates a child task under the parent named in the path (Mechanism 2).
        The create_subtask MCP tool posts here live during a planning run. The
        child inherits the parent's repo + workflow, lands on a human-gate
        (agent_ignore) label, and gets an auto-created parent→child dependency
        edge so the parent isn't dispatched until the child finishes. Guardrails:
        depth limit 1 (a subtask can't create subtasks), a per-parent cap
        (config max_subtasks, default 10), and — when a creating run is in flight
        — the run's config must have subtasks_enabled.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:       { type: string }
                description: { type: string }
                type:        { type: string, enum: [feature, bug, chore, spike] }
                label:
                  type: string
                  description: >
                    Optional landing label; must be an agent_ignore (human-gate)
                    label. Defaults to the workflow's first agent_ignore label.
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { description: Depth limit exceeded, non-gate label, or missing title }
        "403": { description: Creating run's config is not permitted to create subtasks }
        "404": { description: Parent task not found }
        "422": { description: Per-parent subtask cap reached }

  /tasks/{id}/dependencies/{dep_id}:
    delete:
      summary: Remove a dependency edge
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: dep_id
          in: path
          required: true
          schema: { type: string }
          description: The depends_on_task_id of the edge to remove.
      responses:
        "204": { description: Dependency removed (idempotent) }

  /tasks/{id}/approve:
    post:
      summary: Approve the current human gate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/reject:
     post:
       summary: Reject and push back with feedback
       parameters:
         - name: id
           in: path
           required: true
           schema: { type: string }
       requestBody:
         content:
           application/json:
             schema:
               type: object
               properties:
                 note:     { type: string }
                 to_label: { type: string }
       responses:
         "200":
           content:
             application/json:
               schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/notes:
    patch:
      summary: Update agent notes on a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notes]
              properties:
                notes:  { type: string, description: "Notes content (supports markdown)" }
                append: { type: boolean, description: "If true, append to existing notes" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/rerun:
    post:
      summary: Clear a task's active agent run so it can be re-dispatched
      description: >
        Clears active_agent_run_id without changing the task's label, letting
        the dispatcher pick it up again on the next sweep. Does not cancel any
        currently in-flight process; use POST /tasks/{id}/runs/{run_id}/cancel
        for that first if needed.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Rerun requested }
        "404": { description: Task not found }

  /tasks/{id}/review-comments:
    get:
      summary: List inline diff review comments on a task (open and resolved)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ReviewComment" }
    post:
      summary: Add an inline diff review comment
      description: >
        Creates a persistent, file/line-anchored review comment on the task's
        diff. Open comments are injected into every subsequent agent run's
        prompt (under "OPEN REVIEW COMMENTS") until resolved — by the agent via
        the MCP resolve_comment tool, or by a human via PATCH.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_path, start_line, end_line, body]
              properties:
                file_path:   { type: string }
                side:        { type: string, enum: [old, new], default: new }
                start_line:  { type: integer, minimum: 1 }
                end_line:    { type: integer, minimum: 1 }
                quoted_text: { type: string, description: "Diff content the comment anchors to" }
                body:        { type: string, description: "The review comment text" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewComment" }

  /tasks/{id}/review-comments/{comment_id}:
    patch:
      summary: Resolve or reopen a review comment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: comment_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:          { type: string, enum: [resolved, open] }
                resolution_note: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewComment" }
        "404":
          description: Comment not found (or already resolved when resolving)
    delete:
      summary: Delete a review comment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: comment_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /tasks/{id}/diff:
    get:
      summary: Get the task's branch diff against its base (this task's accumulated changes)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  branch: { type: string }
                  diff:   { type: string }

  /tasks/{id}/pr-url:
    get:
      summary: Build a pre-filled GitHub compare/PR URL for the task's branch
      description: >
        Returns a github.com/.../compare URL with the PR title and a markdown
        body (task description, agent notes, and commit subjects) pre-filled, so
        a human can open a fully-described PR in one click. Requires the repo to
        have a GitHub remote and the task to have a provisioned branch.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }

  /tasks/{id}/pr:
    post:
      summary: Push the task's branch and open a GitHub pull request via the gh CLI
      description: >
        Pushes the task's branch to origin, then runs `gh pr create` with the
        title from the task and a body assembled from the description, agent
        notes, and commit subjects. The resulting PR URL and git state are
        stored on the task. Idempotent: if a PR already exists for the branch,
        that PR is returned instead of erroring. Requires the repo to have a
        GitHub remote, the task to have a provisioned branch, and the gh CLI to
        be authenticated.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  pr_url: { type: string }
                  git_state: { type: string, enum: ["", pushed, pr_open, pr_merged, pr_closed] }
        "400": { description: Task has no branch, or repo has no/invalid GitHub remote }
        "502": { description: gh pr create failed (e.g. not authenticated) }

  /tasks/{id}/github-status:
    get:
      summary: Refresh and return the task's live GitHub PR state via the gh CLI
      description: >
        Queries gh for the current PR state of the task's branch and persists
        it. If the live query fails, returns the previously stored git_state
        and pr_url instead of erroring, with an additional error field
        describing the failure. Returns git_state "none" without querying gh
        if the task has no branch yet.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  git_state: { type: string, enum: ["", none, pushed, pr_open, pr_merged, pr_closed] }
                  pr_url:    { type: string }
                  error:     { type: string, nullable: true, description: "Present only when the live gh query failed" }
        "400": { description: Repo has no/invalid GitHub remote }
        "404": { description: Task not found }

  /tasks/{id}/git-state:
    patch:
      summary: Manually set a task's git state
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [git_state]
              properties:
                git_state: { type: string, enum: ["", pushed, pr_open, pr_merged, pr_closed] }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { description: Invalid git_state value }

  /tasks/{id}/label-history:
    get:
      summary: Get a task's label-transition audit trail
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/TaskLabelHistory" } }

  /tasks/{id}/runs:
    get:
      summary: List agent runs for a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/AgentRun" } }

  /tasks/{id}/runs/{run_id}:
    get:
      summary: Get an agent run
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentRun" }

  /tasks/{id}/runs/{run_id}/cancel:
    post:
      summary: Cancel a running agent run
      description: >
        Signals an in-flight run to stop. The pool cancels the run's context —
        propagating to CLI subprocesses (exec.CommandContext) and aborting HTTP
        providers — then, once the provider returns, marks the run `cancelled`
        (not `failed`, and without consuming retry budget), pauses the task so it
        is not immediately re-dispatched, clears the active-run lock, and
        broadcasts `task.agent_done`. Cancellation is asynchronous: a 202 means
        it was signalled, not that the run has fully stopped.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "202":
          description: Cancellation signalled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: cancelling }
                  run_id: { type: string }
        "404": { description: Run not found or does not belong to the task }
        "409": { description: Run is not currently running (already finished or never started). }

  /tasks/{id}/runs/{run_id}/reply:
    post:
      summary: Reply to an agent waiting for human input
      description: >
        Answers a waiting_human run's request_human question with text and
        continues the work. Starts a new run that resumes the prior provider
        session where supported (claude provider, unless the agent config has
        resume_sessions off) so the reply lands as the next message of the same
        conversation; other providers start cold with the reply injected into
        the prompt ("RESPONSE FROM HUMAN"). The task stays on its current
        label — this is a conversation, not a workflow transition — and the
        replied-to run keeps its waiting_human status, matching the
        approve/reject flows. The reply is recorded at the top of the new
        run's log.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: The human's answer to the agent's question.
      responses:
        "202":
          description: Reply dispatched; a new run was created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string, description: The continuation run's id. }
        "400": { description: Missing/empty message }
        "404": { description: Run not found or does not belong to the task }
        "409": { description: Run is not the task's active waiting_human run, or no enabled agent config can serve the reply }
        "503": { description: Worker pool is saturated }

  /tasks/{id}/runs/{run_id}/logs:
    get:
      summary: Get a page of logs for an agent run
      description: >
        Returns a page of the run's log entries in chronological order (oldest
        first). Omit `before` to get the most recent page (the tail); pass a
        previous response's X-Prev-Cursor as `before` to load earlier entries.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: run_id
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          description: Page size. Defaults to 200; values above 1000 are clamped to 1000.
          schema: { type: integer, default: 200, maximum: 1000 }
        - name: before
          in: query
          description: >
            Cursor to load earlier entries: the id of the oldest entry the caller
            already has (returned in the previous response's X-Prev-Cursor
            header). Omit for the newest page.
          schema: { type: string }
      responses:
        "200":
          description: >
            A page of log entries, oldest first. When earlier entries remain,
            X-Has-More is "true" and X-Prev-Cursor carries the id to pass as the
            next `before` cursor.
          headers:
            X-Has-More:
              description: '"true" when earlier entries exist before this page.'
              schema: { type: string }
            X-Prev-Cursor:
              description: Cursor (id) to pass as the next `before` to load earlier entries.
              schema: { type: string }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/AgentLog" } }

  /templates:
    get:
      summary: List task templates
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/TaskTemplate" } }
    post:
      summary: Create a task template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                title:       { type: string }
                description: { type: string }
                type:        { type: string, default: feature }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskTemplate" }
        "409": { description: A template with that name already exists }

  /templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a task template
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskTemplate" }
        "404": { description: Template not found }
    put:
      summary: Update a task template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                title:       { type: string }
                description: { type: string }
                type:        { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskTemplate" }
        "404": { description: Template not found }
        "409": { description: A template with that name already exists }
    delete:
      summary: Delete a task template
      responses:
        "204": { description: Deleted }

  /workflows:
    get:
      summary: List workflows
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Workflow" } }
    post:
      summary: Create a workflow
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }

  /workflows/import:
    post:
      summary: Import a workflow from a YAML body
      description: >
        Creates a new workflow from a YAML document with the same shape
        produced by GET /workflows/{id}/export.yaml (name, description,
        labels, transitions). Fails if a workflow with the same name already
        exists.
      requestBody:
        required: true
        content:
          application/yaml:
            schema: { type: string }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
        "400": { description: Invalid YAML, missing name, or duplicate name }

  /workflows/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a workflow with labels and transitions
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
    put:
      summary: Replace workflow labels and transitions
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
    delete:
      summary: Delete a workflow
      responses:
        "204": { description: Deleted }

  /workflows/{id}/export.yaml:
    get:
      summary: Export a workflow as YAML
      description: >
        Returns the workflow's name, description, labels, and transitions as
        a portable YAML document (Content-Disposition: attachment), suitable
        for re-importing via POST /workflows/import or PUT
        /workflows/{id}/yaml.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: A YAML document describing the workflow
          content:
            application/yaml:
              schema: { type: string }
        "404": { description: Workflow not found }

  /workflows/{id}/yaml:
    put:
      summary: Replace a workflow's labels and transitions from a YAML body
      description: >
        Same YAML shape as GET /workflows/{id}/export.yaml. Replaces the
        workflow's name/description and fully replaces its labels and
        transitions (delete-then-recreate).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/yaml:
            schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
        "400": { description: Invalid YAML, missing name, or duplicate name }
        "404": { description: Workflow not found }

  /agents:
    get:
      summary: List agent configs
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/AgentConfig" } }
    post:
      summary: Create an agent config
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentConfig" }

  /agents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get an agent config
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentConfig" }
    put:
      summary: Update an agent config
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentConfig" }
    delete:
      summary: Delete an agent config
      responses:
        "204": { description: Deleted }

  /agents/models:
    get:
      summary: Get available models for a provider
      parameters:
        - name: provider
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Model list for the provider
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelList" }
        "400":
          description: Missing provider parameter
        "404":
          description: Unknown provider

  /agents/claude-options:
    get:
      summary: Get available Claude plugins and MCP servers for agent config selection
      description: >
        Claude-provider-specific. Discovers plugins from
        ~/.claude/plugins/installed_plugins.json and user-level MCP servers from
        ~/.claude.json's global mcpServers key on the server.
      responses:
        "200":
          description: Discovered Claude plugins and MCP servers
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClaudeOptions" }

  /repos:
    get:
      summary: List repos
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Repo" } }
    post:
      summary: Register a repo
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Repo" }

  /repos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a repo
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Repo" }
    patch:
      summary: Update a repo
      description: >
        Partial update — all fields are optional and merge with the repo's
        existing values. Setting remote_url or workflow_id to an empty string
        clears it (nullable).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:                { type: string }
                path:                { type: string }
                remote_url:          { type: string, nullable: true }
                workflow_id:         { type: string, nullable: true }
                issue_sync_enabled:  { type: boolean }
                issue_sync_label:    { type: string }
                issue_writeback_enabled: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Repo" }
        "404": { description: Repo not found }
    delete:
      summary: Remove a repo
      responses:
        "204": { description: Removed }

  /repos/{id}/tree:
    get:
      summary: Get repo file tree
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: ref
          in: query
          schema: { type: string, default: HEAD }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ref:   { type: string }
                  files: { type: array, items: { type: string } }

  /dashboard:
    get:
      summary: Get dashboard summary
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Dashboard" }

  /dashboard/cost-by-task:
    get:
      summary: Per-task cost rollup (full, uncapped)
      description: >
        Returns { task_id, input_tokens, output_tokens, cost_usd } for every
        task with at least one agent_runs row, across every run status (not
        just terminal ones — see docs/agents.md#cost-budgets). Unlike
        Dashboard.cost_by_task this has no top-N cap and omits task_title; it
        backs the Board page's "Filtered cost" badge, which needs a cost
        figure for every currently-visible task, not just the most expensive
        ones.
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    task_id:       { type: string }
                    input_tokens:  { type: integer }
                    output_tokens: { type: integer }
                    cost_usd:      { type: number, format: double }

  /healthz:
    get:
      summary: Liveness probe
      description: >
        Simple liveness probe, always 200 OK. Reports the running build's
        version ("dev" for local/unstamped builds, or the release tag e.g.
        "v1.4.0" for GHCR images, stamped at build time via
        `-ldflags "-X main.Version=<tag>"`). Deliberately fast/side-effect
        free — unlike /health/providers, it never shells out to gh or touches
        the network. Served at the server root, not under /api/v1.
      responses:
        "200":
          description: Liveness status and running version
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:  { type: string, example: "ok" }
                  version: { type: string, example: "v1.4.0" }

  /github/auth-status:
    get:
      summary: Report whether the gh CLI is authenticated
      description: >
        Used by the frontend to warn on load when GitHub credentials are
        missing, before a user hits a failed PR-creation attempt.
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  authed: { type: boolean }
                  note:   { type: string }

  /health/providers:
    get:
      summary: Provider / onboarding readiness checks
      description: >
        Reports the readiness of each agent provider and supporting piece of
        infrastructure so first-run misconfiguration is visible at a glance
        instead of surfacing as a failed agent run. Checks the claude CLI
        (present + authenticated), API keys for the anthropic/llm providers,
        qwen/opencode binaries (only for providers referenced by an enabled
        agent config), the MCP sidecar binary (MCP_SERVER_PATH), gh auth,
        REPO_BASE_DIR, auto_backup (whether the automatic local-snapshot
        scheduler is enabled via BACKUP_DIR — see docs/backup.md), and
        version (the running build's version — see /healthz). Also includes
        an opt-in update_check row (UPDATE_CHECK_ENABLED, default false) that
        compares the running version against the latest GitHub release tag;
        best-effort and never fails the response (degrades to warn when
        offline or gh is unavailable). Checks are cheap and side-effect free
        (PATH lookups, credential/config-file existence, env/config values)
        — no real agent invocation is performed, so a green result means
        "ready as far as we can tell", not a live token validation.
      responses:
        "200":
          description: Ordered list of readiness checks
          content:
            application/json:
              schema:
                type: object
                properties:
                  checks:
                    type: array
                    items: { $ref: "#/components/schemas/ProviderCheck" }

  /uploads/{task_id}/{filename}:
    get:
      summary: Download a task attachment file
      parameters:
        - name: task_id
          in: path
          required: true
          schema: { type: string }
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The attachment file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400": { description: Invalid path component }
        "404": { description: File not found }

  /backup:
    get:
      summary: Download a consistent database snapshot
      description: >
        Streams a consistent point-in-time snapshot of the SQLite database as
        application/octet-stream, generated via SQLite's VACUUM INTO (not a
        raw file copy), so it's safe to call even while the app is under
        active write load. See docs/backup.md for the full restore procedure,
        the optional BACKUP_DIR/BACKUP_INTERVAL/BACKUP_KEEP automatic
        local-snapshot scheduler, and a Litestream sidecar example for
        continuous offsite replication.
      responses:
        "200":
          description: A SQLite database file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /ws-ticket:
    post:
      summary: Mint a short-lived WebSocket auth ticket
      description: >
        Returns a random, single-use ticket valid for ~30 seconds, used to
        authenticate the GET /ws upgrade (?ticket=<ticket>) without putting
        the long-lived API token in the URL. Requires the same Bearer auth as
        the rest of /api/v1 — minting a ticket already requires holding the
        token. The ticket is consumed on first use; a replayed or expired
        ticket is rejected with 401. See docs/websocket.md for the full
        connection flow, including the deprecated ?token= fallback.
      responses:
        "200":
          description: A freshly minted ticket
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket:
                    type: string
                    description: Opaque single-use token for GET /ws?ticket=
                  expires_in:
                    type: string
                    description: Human-readable TTL (e.g. "30s")
