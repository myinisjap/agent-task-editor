openapi: "3.1.0"
info:
  title: Agent Task Editor API
  version: "1.0.0"

servers:
  - url: http://localhost:8080/api/v1

components:
  schemas:
    Task:
      type: object
      properties:
        id:          { type: string }
        title:       { type: string }
        description: { type: string }
        type:        { type: string, enum: [feature, bug, chore, spike] }
        label:       { type: string }
        repo_id:     { type: string }
        workflow_id: { type: string }
        current_agent_run_id: { type: string, nullable: true }
        active_agent_run_id:  { type: string, nullable: true }
        agent_notes: { type: string }
        branch:        { type: string, description: "Per-task git branch (empty until first dispatch)" }
        worktree_path: { type: string, description: "Path to the task's git worktree" }
        base_ref:      { type: string, description: "Ref the branch forked from" }
        paused:        { type: boolean, description: "If true, the task is never auto-picked-up by the dispatcher" }
        archived:
          type: boolean
          description: >
            If true, the task is hidden from the default board view (GET /tasks
            excludes it unless archived=all|only), skipped by the GitHub PR
            status sweep, and never picked up by the dispatcher. Independent of
            the task's label.
        git_state:     { type: string, enum: ["", pushed, pr_open, pr_merged, pr_closed] }
        transient_retry_count:
          type: integer
          description: >
            Number of consecutive automatic retries this task has had for
            transient provider errors (rate limits, network blips, upstream
            5xx). Reset to 0 on a genuine failure or a successful run.
        next_retry_at:
          type: string
          format: date-time
          nullable: true
          description: >
            If set, the task is in a backed-off auto-retry state and will not
            be picked up by the dispatcher again until this time.
        source:
          type: string
          description: >
            Where the task was imported from ("github" for the GitHub Issues
            importer). Empty for manually created tasks.
        source_ref:
          type: string
          description: >
            External item the task was imported from, unique within source
            (e.g. "owner/repo#123"). Empty for manually created tasks.
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    TaskTemplate:
      type: object
      description: >
        Reusable pre-filled title/description/type for recurring shapes of
        work (e.g. "upgrade dependency X", "fix flaky test"). Applied in the
        new-task form; creating a task from a template just pre-fills fields.
      properties:
        id:          { type: string }
        name:        { type: string, description: "Unique display name" }
        title:       { type: string }
        description: { type: string }
        type:        { type: string, enum: [feature, bug, chore, spike] }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    WorkflowLabel:
      type: object
      properties:
        id:           { type: string }
        workflow_id:  { type: string }
        name:         { type: string }
        color:        { type: string }
        sort_order:   { type: integer }
        agent_ignore: { type: integer }
        is_terminal:  { type: integer }

    WorkflowTransition:
      type: object
      properties:
        id:               { type: string }
        workflow_id:      { type: string }
        from_label:       { type: string }
        to_label:         { type: string }
        trigger_type:     { type: string, enum: [agent, human, both] }
        agent_config_id:  { type: string, nullable: true }

    Workflow:
      type: object
      properties:
        id:          { type: string }
        name:        { type: string }
        description: { type: string }
        labels:      { type: array, items: { $ref: "#/components/schemas/WorkflowLabel" } }
        transitions: { type: array, items: { $ref: "#/components/schemas/WorkflowTransition" } }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    AgentConfig:
      type: object
      properties:
        id:            { type: string }
        name:          { type: string }
        provider:      { type: string, enum: [claude_code, openai, anthropic, custom, opencode] }
        model:         { type: string }
        system_prompt: { type: string }
        labels:        { type: string, description: "JSON array of label names" }
        env:           { type: string, description: "JSON object of env vars" }
        max_tokens:    { type: integer }
        timeout_secs:  { type: integer }
        max_turns:     { type: integer }
        max_retries:
          type: integer
          description: >
            Number of automatic consecutive retries allowed for a task after a
            transient provider error (rate limit, network blip, upstream 5xx)
            before it is left failed / escalated to waiting_human for a human
            to intervene. 0 disables auto-retry. Default 3.
        retry_backoff_secs:
          type: integer
          description: >
            Base backoff, in seconds, before a transient-error retry becomes
            eligible for re-dispatch. Exponential backoff (base * 2^attempt,
            capped at 10 minutes) is applied on top of this base. Default 30.
        enabled_plugins:
          type: string
          description: >
            JSON array of Claude plugin IDs ("<name>@<marketplace>") enabled for this
            agent config. Claude-provider only; defaults to "[]" (all plugins off).
        enabled_mcp_servers:
          type: string
          description: >
            JSON array of Claude user-level MCP server names (from ~/.claude.json's
            global mcpServers) enabled for this agent config. Claude-provider only;
            defaults to "[]" (all MCP servers off).
        command_allowlist:
          type: string
          description: >
            JSON array of shell-command glob patterns ("*" wildcard). If non-empty, only
            commands matching at least one pattern may run via run_bash/Bash. Fully
            enforced for anthropic, llm, and qwen_code. NOT an effective restriction for
            claude (the CLI only auto-approves matches; non-matching commands still run
            — see docs/providers/claude.md). Not enforced for opencode. Defaults to "[]"
            (no restriction).
        command_denylist:
          type: string
          description: >
            JSON array of shell-command glob patterns ("*" wildcard). Commands matching
            any pattern here are always denied, regardless of command_allowlist. Checked
            first. Fully enforced for anthropic, llm, and claude. NOT enforced for
            qwen_code (no confirmed CLI denylist flag) or opencode. Defaults to "[]"
            (no restriction).
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    ModelList:
      type: object
      properties:
        provider:      { type: string }
        default_model: { type: string }
        models:        { type: array, items: { type: string } }

    ClaudeOptions:
      type: object
      description: >
        Claude plugins and user-level MCP servers discovered on the server's
        Claude home directory (~/.claude/plugins/installed_plugins.json and the
        global mcpServers key in ~/.claude.json), for per-agent-config selection.
      properties:
        plugins:
          type: array
          items:
            type: object
            properties:
              id:          { type: string, description: "\"<name>@<marketplace>\"" }
              name:        { type: string }
              marketplace: { type: string }
        mcp_servers:
          type: array
          items: { type: string }

    Repo:
      type: object
      properties:
        id:          { type: string }
        name:        { type: string }
        path:        { type: string }
        remote_url:  { type: string, nullable: true }
        workflow_id: { type: string, nullable: true }
        issue_sync_enabled:
          type: integer
          description: >
            1 = open GitHub issues matching issue_sync_label are periodically
            imported as tasks (requires remote_url and workflow_id). 0 = off.
        issue_sync_label:
          type: string
          description: >
            Only import issues carrying this label (empty = all open issues).
        created_at:  { type: string, format: date-time }

    ReviewComment:
      type: object
      description: >-
        A persistent, file/line-anchored inline review comment on a task's
        diff. Open comments are injected into every agent run's prompt until
        resolved (by an agent via the MCP resolve_comment tool, or by a human).
      properties:
        id:                 { type: string }
        task_id:            { type: string }
        file_path:          { type: string }
        side:               { type: string, enum: [old, new] }
        start_line:         { type: integer }
        end_line:           { type: integer }
        quoted_text:        { type: string }
        body:               { type: string }
        status:             { type: string, enum: [open, resolved] }
        resolution_note:    { type: string, nullable: true }
        resolved_by_run_id: { type: string, nullable: true, description: "Run that resolved it; null when human-resolved" }
        created_at:         { type: string, format: date-time }
        updated_at:         { type: string, format: date-time }

    AgentRun:
      type: object
      properties:
        id:               { type: string }
        task_id:          { type: string }
        agent_config_id:  { type: string }
        status:           { type: string, enum: [pending, running, completed, failed, waiting_human, cancelled] }
        feedback:         { type: string, nullable: true }
        started_at:       { type: string, format: date-time, nullable: true }
        completed_at:     { type: string, format: date-time, nullable: true }
        created_at:       { type: string, format: date-time }
        input_tokens:
          type: integer
          description: >-
            Total input/prompt tokens consumed across the run (summed across
            all turns of a multi-turn agentic loop). 0 if the provider does
            not report usage (e.g. opencode currently).
        output_tokens:
          type: integer
          description: Total output/completion tokens consumed across the run.
        cost_usd:
          type: number
          format: double
          description: >-
            Estimated USD cost of the run. For the `claude` CLI provider this
            is the CLI's own authoritative total_cost_usd figure (which may
            legitimately be 0 under a Claude Max subscription); for
            anthropic/llm providers it is computed from input/output tokens
            via an internal, approximate pricing table. 0 if unknown/unreported.

    AgentLog:
      type: object
      properties:
        id:           { type: string }
        agent_run_id: { type: string }
        timestamp:    { type: string, format: date-time }
        type:         { type: string, enum: [stdout, stderr, system, tool_call, tool_result] }
        content:      { type: string }

    Dashboard:
      type: object
      properties:
        label_counts:
          type: object
          additionalProperties: { type: integer }
        active_agents:
          type: array
          items:
            type: object
            properties:
              run_id:     { type: string }
              task_id:    { type: string }
              task_title: { type: string }
              agent_name: { type: string }
              started_at: { type: string }
        intervention_queue:
          type: array
          items:
            type: object
            properties:
              run_id:     { type: string }
              task_id:    { type: string }
              task_title: { type: string }
              message:    { type: string, nullable: true }
              created_at: { type: string }
        cost_total:
          type: object
          description: >-
            Aggregate token/cost usage across all runs in a terminal state
            (completed, failed, waiting_human).
          properties:
            input_tokens:  { type: integer }
            output_tokens: { type: integer }
            cost_usd:      { type: number, format: double }
        cost_by_provider:
          type: array
          description: >-
            Per-provider breakdown of token/cost usage, sorted by cost
            descending. Runs whose agent_config was later deleted are
            excluded (agent_config_id is set NULL on delete, so they can no
            longer be attributed to a provider).
          items:
            type: object
            properties:
              provider:      { type: string }
              input_tokens:  { type: integer }
              output_tokens: { type: integer }
              cost_usd:      { type: number, format: double }
              run_count:     { type: integer }
        claude_usage:
          type: object
          description: >-
            Live Claude account rate-limit usage from Anthropic's OAuth usage
            endpoint (5-hour rolling window + weekly window). `available` is
            false when the server has no Claude OAuth credentials or the fetch
            failed; other fields are zero/absent in that case.
          properties:
            available:           { type: boolean }
            five_hour_percent:   { type: number, format: double }
            five_hour_resets_at: { type: string, format: date-time, nullable: true }
            weekly_percent:      { type: number, format: double }
            weekly_resets_at:    { type: string, format: date-time, nullable: true }

    Error:
      type: object
      properties:
        error: { type: string }

paths:
  /tasks:
    get:
      summary: List tasks
      parameters:
        - name: q
          in: query
          description: Case-insensitive substring search over title and description
          schema: { type: string }
        - name: label
          in: query
          schema: { type: string }
        - name: repo_id
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: git_state
          in: query
          schema: { type: string, enum: [pushed, pr_open, pr_merged, pr_closed] }
        - name: archived
          in: query
          description: >
            Archived-task visibility. Omitted (default) hides archived tasks;
            "only" returns just archived tasks; "all" returns everything.
          schema: { type: string, enum: [all, only] }
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Task" } }
    post:
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, repo_id, workflow_id]
              properties:
                title:       { type: string }
                description: { type: string }
                type:        { type: string }
                repo_id:     { type: string }
                workflow_id: { type: string }
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/bulk:
    post:
      summary: Apply one action to many tasks
      description: >
        Applies a single action to every task in ids. Each task is processed
        independently — one failure doesn't abort the rest. Returns 200 if
        every task succeeded, 207 if any failed; the per-task results array
        reports each outcome either way. "move" transitions are validated
        through the workflow engine exactly like PATCH /tasks/{id}/label.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, action]
              properties:
                ids:      { type: array, items: { type: string } }
                action:   { type: string, enum: [move, pause, resume, archive, unarchive] }
                to_label: { type: string, description: "Required when action is move" }
                note:     { type: string, description: "Optional transition note (move only)" }
      responses:
        "200":
          description: All tasks processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:    { type: string }
                        ok:    { type: boolean }
                        error: { type: string }
        "207": { description: Some tasks failed; see per-task results }
        "400": { description: Missing ids, unknown action, or move without to_label }

  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a task
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
    patch:
      summary: Update a task's metadata
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:       { type: string }
                description: { type: string }
                type:        { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
    delete:
      summary: Delete a task
      responses:
        "204": { description: Deleted }

  /tasks/{id}/label:
    patch:
      summary: Move task label (human-initiated)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_label]
              properties:
                to_label: { type: string }
                note:     { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { description: Invalid transition }
        "403": { description: Gate required }

  /tasks/{id}/archive:
    patch:
      summary: Archive or unarchive a task
      description: >
        Archived tasks are hidden from the default board view, excluded from
        the GitHub PR status sweep, and never dispatched to agents. Archiving
        does not change the task's label.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [archived]
              properties:
                archived: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { description: Task not found }

  /tasks/{id}/approve:
    post:
      summary: Approve the current human gate
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/reject:
     post:
       summary: Reject and push back with feedback
       parameters:
         - name: id
           in: path
           required: true
           schema: { type: string }
       requestBody:
         content:
           application/json:
             schema:
               type: object
               properties:
                 note:     { type: string }
                 to_label: { type: string }
       responses:
         "200":
           content:
             application/json:
               schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/notes:
    patch:
      summary: Update agent notes on a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notes]
              properties:
                notes:  { type: string, description: "Notes content (supports markdown)" }
                append: { type: boolean, description: "If true, append to existing notes" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }

  /tasks/{id}/review-comments:
    get:
      summary: List inline diff review comments on a task (open and resolved)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ReviewComment" }
    post:
      summary: Add an inline diff review comment
      description: >
        Creates a persistent, file/line-anchored review comment on the task's
        diff. Open comments are injected into every subsequent agent run's
        prompt (under "OPEN REVIEW COMMENTS") until resolved — by the agent via
        the MCP resolve_comment tool, or by a human via PATCH.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_path, start_line, end_line, body]
              properties:
                file_path:   { type: string }
                side:        { type: string, enum: [old, new], default: new }
                start_line:  { type: integer, minimum: 1 }
                end_line:    { type: integer, minimum: 1 }
                quoted_text: { type: string, description: "Diff content the comment anchors to" }
                body:        { type: string, description: "The review comment text" }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewComment" }

  /tasks/{id}/review-comments/{comment_id}:
    patch:
      summary: Resolve or reopen a review comment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: comment_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:          { type: string, enum: [resolved, open] }
                resolution_note: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewComment" }
        "404":
          description: Comment not found (or already resolved when resolving)
    delete:
      summary: Delete a review comment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: comment_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /tasks/{id}/diff:
    get:
      summary: Get the task's branch diff against its base (this task's accumulated changes)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  branch: { type: string }
                  diff:   { type: string }

  /tasks/{id}/pr-url:
    get:
      summary: Build a pre-filled GitHub compare/PR URL for the task's branch
      description: >
        Returns a github.com/.../compare URL with the PR title and a markdown
        body (task description, agent notes, and commit subjects) pre-filled, so
        a human can open a fully-described PR in one click. Requires the repo to
        have a GitHub remote and the task to have a provisioned branch.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }

  /tasks/{id}/runs:
    get:
      summary: List agent runs for a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/AgentRun" } }

  /tasks/{id}/runs/{run_id}:
    get:
      summary: Get an agent run
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentRun" }

  /tasks/{id}/runs/{run_id}/logs:
    get:
      summary: Get logs for an agent run
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: run_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/AgentLog" } }

  /templates:
    get:
      summary: List task templates
      responses:
        "200":
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/TaskTemplate" } }
    post:
      summary: Create a task template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                title:       { type: string }
                description: { type: string }
                type:        { type: string, default: feature }
      responses:
        "201":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskTemplate" }
        "409": { description: A template with that name already exists }

  /templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a task template
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskTemplate" }
        "404": { description: Template not found }
    put:
      summary: Update a task template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                title:       { type: string }
                description: { type: string }
                type:        { type: string }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskTemplate" }
        "404": { description: Template not found }
        "409": { description: A template with that name already exists }
    delete:
      summary: Delete a task template
      responses:
